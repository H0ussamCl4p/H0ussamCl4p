name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # tous les jours à minuit UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: H0ussamCl4p
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#0891b2&color_dots=#0f172a,#0891b2,#06b6d4,#22d3ee,#67e8f9

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
